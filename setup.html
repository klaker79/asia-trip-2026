<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Configurar Viaje — Trip Planner</title>
    <link rel="stylesheet" href="css/setup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <header class="setup-header">
        <h1>✈️ Trip Planner</h1>
        <p>Configura tu viaje en 5 minutos</p>
    </header>

    <!-- Progress Bar -->
    <div class="wizard-progress" id="wizard-progress">
        <div class="progress-step active" data-step="1" onclick="goToStep(1)">
            <div class="progress-dot">🌍</div>
            <div class="progress-label">Viaje</div>
        </div>
        <div class="progress-line" id="line-1-2"></div>
        <div class="progress-step" data-step="2" onclick="goToStep(2)">
            <div class="progress-dot">🏙️</div>
            <div class="progress-label">Ciudades</div>
        </div>
        <div class="progress-line" id="line-2-3"></div>
        <div class="progress-step" data-step="3" onclick="goToStep(3)">
            <div class="progress-dot">✈️</div>
            <div class="progress-label">Vuelos</div>
        </div>
        <div class="progress-line" id="line-3-4"></div>
        <div class="progress-step" data-step="4" onclick="goToStep(4)">
            <div class="progress-dot">🏨</div>
            <div class="progress-label">Hoteles</div>
        </div>
        <div class="progress-line" id="line-4-5"></div>
        <div class="progress-step" data-step="5" onclick="goToStep(5)">
            <div class="progress-dot">🎯</div>
            <div class="progress-label">Extras</div>
        </div>
    </div>

    <!-- Wizard Steps -->
    <div class="wizard-container">

        <!-- STEP 1: Trip Basics -->
        <div class="wizard-step active" data-step="1">
            <div class="step-title">🌍 Datos del viaje</div>

            <div class="form-card">
                <div class="form-row single">
                    <div class="form-group">
                        <label>Nombre del viaje</label>
                        <input type="text" id="trip-name" placeholder="Ej: Asia Trip 2026" value="">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Fecha de salida</label>
                        <input type="date" id="trip-start">
                    </div>
                    <div class="form-group">
                        <label>Fecha de vuelta</label>
                        <input type="date" id="trip-end">
                    </div>
                </div>
            </div>

            <div class="step-title" style="margin-top:1.5rem">👥 Viajeros</div>
            <div id="travelers-list">
                <!-- Dynamic travelers -->
            </div>
            <button class="add-btn" onclick="addTraveler()">+ Añadir viajero</button>

            <!-- Import/Export -->
            <div class="io-section">
                <button class="io-btn" onclick="exportTrip()">📤 Exportar JSON</button>
                <label class="io-btn" style="cursor:pointer">
                    📥 Importar JSON
                    <input type="file" accept=".json" onchange="importTrip(this)" hidden>
                </label>
            </div>
        </div>

        <!-- STEP 2: Cities -->
        <div class="wizard-step" data-step="2">
            <div class="step-title">🏙️ Destinos</div>
            <div id="cities-list">
                <!-- Dynamic cities -->
            </div>
            <button class="add-btn" onclick="addCity()">+ Añadir ciudad</button>
        </div>

        <!-- STEP 3: Flights -->
        <div class="wizard-step" data-step="3">
            <div class="step-title">✈️ Vuelos y transportes</div>
            <div id="flights-list">
                <!-- Dynamic flights -->
            </div>
            <button class="add-btn" onclick="addFlight()">+ Añadir vuelo / tren</button>
        </div>

        <!-- STEP 4: Hotels -->
        <div class="wizard-step" data-step="4">
            <div class="step-title">🏨 Alojamientos</div>
            <div id="hotels-list">
                <!-- Dynamic hotels -->
            </div>
            <button class="add-btn" onclick="addHotel()">+ Añadir hotel</button>
        </div>

        <!-- STEP 5: Extras + Review -->
        <div class="wizard-step" data-step="5">
            <div class="step-title">🎯 Actividades y tareas</div>

            <div id="activities-list">
                <!-- Dynamic activities -->
            </div>
            <button class="add-btn" onclick="addActivity()" style="margin-bottom:1.5rem">+ Añadir actividad</button>

            <div class="step-title">📝 Tareas pendientes</div>
            <div id="todos-list">
                <!-- Dynamic todos -->
            </div>
            <button class="add-btn" onclick="addTodo()" style="margin-bottom:1.5rem">+ Añadir tarea</button>

            <!-- Preview Summary -->
            <div class="preview-summary" id="preview-summary">
                <h3>📊 Resumen de tu viaje</h3>
                <!-- Filled by JS -->
            </div>
        </div>

    </div>

    <!-- Navigation -->
    <div class="wizard-nav">
        <button class="nav-btn nav-btn-back" id="btn-back" onclick="prevStep()" style="display:none">← Atrás</button>
        <button class="nav-btn nav-btn-next" id="btn-next" onclick="nextStep()">Siguiente →</button>
        <button class="nav-btn nav-btn-finish" id="btn-finish" onclick="finishWizard()" style="display:none">🚀 Generar
            mi app de viaje</button>
    </div>

    <script src="js/setup.js"></script>
</body>

</html>
